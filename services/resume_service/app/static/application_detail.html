<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-link { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.2s;
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }
        
        .header-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .header-card h1 { 
            font-size: 28px; 
            color: #333; 
            margin-bottom: 10px;
        }
        .header-meta { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            align-items: center;
            color: #666;
            font-size: 15px;
        }
        
        .score-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 25px;
        }
        .score-card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }
        .score-label { 
            color: #888; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 10px;
        }
        .score-value { 
            font-size: 36px; 
            font-weight: 700; 
            color: #667eea;
        }
        .score-improvement { 
            font-size: 14px; 
            color: #155724; 
            background: #d4edda; 
            padding: 4px 10px; 
            border-radius: 6px; 
            display: inline-block; 
            margin-top: 8px;
        }
        
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .card h2 { 
            font-size: 20px; 
            margin-bottom: 20px; 
            color: #333; 
            border-bottom: 2px solid #f0f0f0; 
            padding-bottom: 12px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px;
        }
        .field { margin-bottom: 18px; }
        .field-label { 
            font-weight: 600; 
            color: #888; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 6px;
        }
        .field-value { color: #333; font-size: 15px; line-height: 1.6; }
        
        .badge { 
            display: inline-block; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase;
        }
        .badge-tailor { background: #d4edda; color: #155724; }
        .badge-review { background: #fff3cd; color: #856404; }
        .badge-skip { background: #f8d7da; color: #721c24; }
        .badge-completed { background: #d4edda; color: #155724; }
        .badge-running { background: #cfe2ff; color: #084298; }
        .badge-failed { background: #f8d7da; color: #721c24; }
        .badge-queued { background: #e2e3e5; color: #383d41; }
        .badge-pending_review { background: #cfe2ff; color: #084298; }
        .badge-reviewed { background: #e2e3e5; color: #383d41; }
        .badge-approved { background: #d4edda; color: #155724; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
        
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { 
            background: #f0f0f0; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            color: #555;
        }
        .tag-matched { background: #d4edda; color: #155724; }
        .tag-missing { background: #f8d7da; color: #721c24; }
        
        .timeline { margin-top: 15px; }
        .timeline-item { 
            display: flex; 
            gap: 15px; 
            padding: 15px 0; 
            border-bottom: 1px solid #f0f0f0;
        }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-icon { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            flex-shrink: 0;
        }
        .timeline-icon-status { background: #cfe2ff; }
        .timeline-icon-field { background: #d4edda; }
        .timeline-icon-browser { background: #fff3cd; }
        .timeline-icon-resume { background: #e7d4f5; }
        .timeline-icon-error { background: #f8d7da; }
        .timeline-content { flex: 1; }
        .timeline-time { color: #999; font-size: 12px; margin-bottom: 5px; }
        .timeline-message { color: #333; font-size: 14px; font-weight: 500; }
        
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-download { 
            background: #28a745; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            display: inline-block; 
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-download:hover { background: #218838; }
        
        .review-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-family: inherit; 
            font-size: 14px; 
            resize: vertical; 
            min-height: 100px;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        
        .callout { 
            background: #fff3cd; 
            border-left: 4px solid #856404; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            color: #856404;
        }
        
        .collapsible { cursor: pointer; user-select: none; }
        .collapsible:hover { background: #f8f9fa; border-radius: 8px; }
        .collapsible-content { display: none; padding-top: 15px; }
        .collapsible-content.active { display: block; }
        
        .link { color: #667eea; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            .score-cards { grid-template-columns: 1fr; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
        <div id="content">
            <div style="text-align: center; padding: 60px; color: white;">
                <div style="font-size: 48px; margin-bottom: 20px;">⏳</div>
                <div style="font-size: 18px;">Loading application...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadApplication() {
            const appId = window.location.pathname.split('/').pop();
            try {
                const [appRes, eventsRes] = await Promise.all([
                    fetch(`/applications/${appId}`),
                    fetch(`/applications/${appId}/events`)
                ]);
                
                if (!appRes.ok) throw new Error('Application not found');
                const app = await appRes.json();
                
                let events = [];
                if (eventsRes.ok) {
                    const eventsData = await eventsRes.json();
                    events = eventsData.events || [];
                }
                
                renderApplication(app, events);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div style="background: white; padding: 30px; border-radius: 12px; color: #721c24;">Error: ${error.message}</div>`;
            }
        }

        function renderApplication(app, events) {
            const improvement = app.generated_resume_ats_score && app.actual_resume_ats_score ? 
                (app.generated_resume_ats_score - app.actual_resume_ats_score).toFixed(1) : null;
            
            const html = `
                <div class="header-card">
                    <h1>${app.company || 'Unknown Company'}</h1>
                    <div class="header-meta">
                        <span><strong>${app.title || 'Unknown Title'}</strong></span>
                        <span>📍 ${app.location || 'Unknown'}</span>
                        <span>${renderBadge(app.decision, 'decision')}</span>
                        ${app.job_url ? `<a href="${app.job_url}" target="_blank" class="link">View Job Posting →</a>` : ''}
                    </div>
                </div>
                
                <div class="score-cards">
                    <div class="score-card">
                        <div class="score-label">Base ATS Score</div>
                        <div class="score-value">${app.actual_resume_ats_score ? app.actual_resume_ats_score.toFixed(1) : '-'}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label">Generated ATS Score</div>
                        <div class="score-value">${app.generated_resume_ats_score ? app.generated_resume_ats_score.toFixed(1) : '-'}</div>
                        ${improvement && parseFloat(improvement) > 0 ? `<div class="score-improvement">+${improvement} points</div>` : ''}
                    </div>
                    <div class="score-card">
                        <div class="score-label">Keyword Coverage</div>
                        <div class="score-value">${app.generated_resume_keyword_coverage_pct ? app.generated_resume_keyword_coverage_pct.toFixed(1) + '%' : '-'}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label">Status</div>
                        <div class="score-value" style="font-size: 24px;">${renderBadge(app.apply_status, 'status')}</div>
                    </div>
                </div>
                
                ${app.resume_pdf_path || app.resume_docx_path ? `
                <div class="card">
                    <h2>📄 Generated Resume</h2>
                    <div>
                        ${app.resume_pdf_path ? `<a href="/applications/${app.id}/resume/pdf" target="_blank" class="btn-download">📥 Download PDF</a>` : ''}
                        ${app.resume_docx_path ? `<a href="/applications/${app.id}/resume/docx" class="btn-download">📥 Download DOCX</a>` : ''}
                    </div>
                    ${app.resume_pdf_path ? `<div style="margin-top: 10px; color: #666; font-size: 13px;">📄 ${getFilename(app.resume_pdf_path)}</div>` : ''}
                </div>
                ` : ''}
                
                <div class="card">
                    <h2>🎯 Tailoring Changes</h2>
                    <div class="callout">
                        ℹ️ <strong>Note:</strong> ATS scores are internal estimates based on keyword coverage, resume structure, and JD alignment.
                    </div>
                    <div class="grid">
                        <div class="field">
                            <div class="field-label">Base Resume ATS</div>
                            <div class="field-value">${app.actual_resume_ats_score ? app.actual_resume_ats_score.toFixed(1) : '-'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Generated Resume ATS</div>
                            <div class="field-value">
                                ${app.generated_resume_ats_score ? app.generated_resume_ats_score.toFixed(1) : '-'}
                                ${improvement && parseFloat(improvement) > 0 ? ` <span style="color: #155724; font-weight: 600;">(+${improvement})</span>` : ''}
                            </div>
                        </div>
                        <div class="field">
                            <div class="field-label">Base Coverage</div>
                            <div class="field-value">${app.actual_resume_keyword_coverage_pct ? app.actual_resume_keyword_coverage_pct.toFixed(1) + '%' : '-'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Generated Coverage</div>
                            <div class="field-value">${app.generated_resume_keyword_coverage_pct ? app.generated_resume_keyword_coverage_pct.toFixed(1) + '%' : '-'}</div>
                        </div>
                    </div>
                    ${app.matched_keywords && app.matched_keywords.length > 0 ? `
                    <div class="field" style="margin-top: 20px;">
                        <div class="field-label">✅ Matched Keywords</div>
                        <div class="tag-list">
                            ${app.matched_keywords.map(kw => `<span class="tag tag-matched">${kw}</span>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                    ${app.missing_keywords && app.missing_keywords.length > 0 ? `
                    <div class="field">
                        <div class="field-label">❌ Missing Keywords</div>
                        <div class="tag-list">
                            ${app.missing_keywords.map(kw => `<span class="tag tag-missing">${kw}</span>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
                
                ${events && events.length > 0 ? `
                <div class="card">
                    <h2>📈 Agent Activity Timeline</h2>
                    <div style="color: #666; font-size: 13px; margin-bottom: 15px;">${events.length} events tracked</div>
                    <div class="timeline">
                        ${events.map(e => `
                            <div class="timeline-item">
                                <div class="timeline-icon timeline-icon-${e.type}">${getIcon(e.type)}</div>
                                <div class="timeline-content">
                                    <div class="timeline-time">${formatTime(e.timestamp)}</div>
                                    <div class="timeline-message">${getStepLabel(e.step)}</div>
                                    ${e.message ? `<div style="color: #666; font-size: 13px; margin-top: 4px;">${e.message}</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                ${app.form_fill_audit ? `
                <div class="card">
                    <h2>✅ Autofilled Form Fields</h2>
                    <div class="grid">
                        ${Object.entries(app.form_fill_audit).slice(0, 12).map(([key, value]) => `
                            <div class="field">
                                <div class="field-label">${formatFieldName(key)}</div>
                                <div class="field-value">${formatValue(key, value)}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                <div class="card">
                    <h2>👤 Human Review</h2>
                    <div class="grid">
                        <div class="field">
                            <div class="field-label">Review Status</div>
                            <div class="field-value">${renderBadge(app.review_status, 'review')}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Autofill Status</div>
                            <div class="field-value">${renderBadge(app.apply_status, 'status')}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Submission</div>
                            <div class="field-value">${app.dry_run === false ? '<span class="badge badge-approved">Submitted</span>' : '<span class="badge badge-queued">Not Submitted (Dry Run)</span>'}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Slack Notification</div>
                            <div class="field-value">${app.slack_sent ? '✅ Sent' : '❌ Not Sent'}</div>
                        </div>
                    </div>
                    ${app.review_notes ? `
                    <div class="field" style="margin-top: 20px;">
                        <div class="field-label">Review Notes</div>
                        <div class="field-value">${app.review_notes}</div>
                    </div>
                    ` : ''}
                    <div style="margin-top: 25px;">
                        <div class="field-label">Update Review Status</div>
                        <div class="review-buttons">
                            <button class="btn btn-secondary" onclick="updateReview('reviewed')">Mark Reviewed</button>
                            <button class="btn btn-success" onclick="updateReview('approved')">✅ Approve</button>
                            <button class="btn btn-danger" onclick="updateReview('rejected')">❌ Reject</button>
                        </div>
                        <textarea id="reviewNotes" placeholder="Add review notes (optional)...">${app.review_notes || ''}</textarea>
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="collapsible" onclick="toggleCollapsible(this)">🔧 Technical Details <span style="float: right;">▼</span></h2>
                    <div class="collapsible-content">
                        <div class="grid">
                            <div class="field">
                                <div class="field-label">Application ID</div>
                                <div class="field-value"><code>${app.id || '-'}</code></div>
                            </div>
                            <div class="field">
                                <div class="field-label">Created At</div>
                                <div class="field-value">${formatDate(app.created_at)}</div>
                            </div>
                            <div class="field">
                                <div class="field-label">Updated At</div>
                                <div class="field-value">${formatDate(app.updated_at)}</div>
                            </div>
                            <div class="field">
                                <div class="field-label">Return Code</div>
                                <div class="field-value">${app.apply_return_code !== null ? app.apply_return_code : '-'}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function toggleCollapsible(el) {
            const content = el.nextElementSibling;
            const arrow = el.querySelector('span');
            content.classList.toggle('active');
            arrow.textContent = content.classList.contains('active') ? '▲' : '▼';
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        }

        function formatTime(d) {
            if (!d) return '';
            return new Date(d).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function renderBadge(val, type) {
            if (!val) return '-';
            let text = val;
            if (type === 'status' && val === 'completed') text = 'Completed';
            if (type === 'review') text = val.replace('_', ' ');
            return `<span class="badge badge-${val}">${text}</span>`;
        }

        function getIcon(type) {
            const icons = { status: '📊', field: '✅', browser: '🌐', resume: '📄', error: '❌' };
            return icons[type] || '•';
        }

        function getStepLabel(step) {
            const labels = {
                'job_received': 'Job received', 'job_parsed': 'Job parsed', 'resume_scored': 'Resume scored',
                'decision_made': 'Decision made', 'resume_generated': 'Resume generated', 'browser_opened': 'Browser opened',
                'field_filled': 'Field filled', 'resume_uploaded': 'Resume uploaded', 'apply_completed': 'Completed'
            };
            return labels[step] || step;
        }

        function formatFieldName(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function formatValue(key, value) {
            if (key === 'submitted' && value === false) return 'No';
            if (key === 'dry_run' && value === true) return 'Yes';
            if (value === true) return '✅ Yes';
            if (value === false) return '❌ No';
            if (value === null || value === undefined || value === '') return '-';
            return value;
        }

        function getFilename(path) {
            return path ? path.split('/').pop() : '';
        }

        async function updateReview(status) {
            const appId = window.location.pathname.split('/').pop();
            const notes = document.getElementById('reviewNotes').value.trim();
            
            try {
                const response = await fetch(`/applications/${appId}/review`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ review_status: status, review_notes: notes || null })
                });

                if (!response.ok) throw new Error('Failed to update');
                window.location.reload();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        loadApplication();
    </script>
</body>
</html>
